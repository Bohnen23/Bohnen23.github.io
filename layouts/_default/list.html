{{ define "main" }}
<header class="site-header">
  <div class="header-inner">
    <h1 class="site-title">{{ .Site.Title }}</h1>
    <p class="site-desc">{{ .Site.Params.description }}</p>
  </div>
</header>

<main class="site-main">
  <div class="main-inner">

    <section class="category-filter">
      <span class="filter-label">主题：</span>
      <a href="#" class="filter-tag active" data-cat="all">全部</a>
      {{ range $name, $taxonomy := .Site.Taxonomies.categories }}
      <a href="#" class="filter-tag" data-cat="{{ $name }}">{{ $name }}</a>
      {{ end }}
    </section>

    <section class="post-list">
      {{ range .Site.RegularPages.ByDate.Reverse }}
      <article class="post-item" data-cat="{{ with .Params.categories }}{{ index . 0 }}{{ end }}">
        <a href="{{ .Permalink }}">
          <time class="post-date">{{ .Date.Format "2006.01.02" }}</time>
          <h2 class="post-title">{{ .Title }}</h2>
          <p class="post-excerpt">{{ .Summary }}</p>
        </a>
      </article>
      {{ end }}
    </section>

  </div>
</main>

<script>
document.querySelectorAll('.filter-tag').forEach(tag => {
  tag.addEventListener('click', function(e) {
    e.preventDefault();
    document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    const cat = this.dataset.cat;
    document.querySelectorAll('.post-item').forEach(post => {
      if (cat === 'all' || post.dataset.cat === cat) {
        post.style.display = '';
        post.style.opacity = '0';
        setTimeout(() => { post.style.opacity = '1'; }, 50);
      } else {
        post.style.display = 'none';
      }
    });
  });
});
</script>
{{ end }}
