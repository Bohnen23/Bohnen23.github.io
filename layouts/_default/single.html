{{ define "main" }}
<header class="post-header">
  <div class="post-header-inner">
    <div class="post-meta">
      <time>{{ .Date.Format "2006.01.02" }}</time>
      {{ with .Params.categories }}<span>{{ index . 0 }}</span>{{ end }}
    </div>
    <h1 class="post-title-main">{{ .Title }}</h1>
  </div>
</header>

<article class="post-body">
  {{ .Content }}
</article>

<nav class="post-nav">
  {{ with .PrevInSection }}
  <a href="{{ .Permalink }}">
    <span class="nav-label">← 上一篇</span>
    {{ .Title }}
  </a>
  {{ else }}
  <span></span>
  {{ end }}

  {{ with .NextInSection }}
  <a href="{{ .Permalink }}" style="text-align: right;">
    <span class="nav-label">下一篇 →</span>
    {{ .Title }}
  </a>
  {{ else }}
  <span></span>
  {{ end }}
</nav>
{{ end }}
